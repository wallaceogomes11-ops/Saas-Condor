<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login · EstoqueFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="js/auth.js"></script>
<style>
:root{
  --bg:#f0f4fa;--surface:#fff;--border:#e1e8f5;--border-2:#d5dff0;
  --txt:#0f172a;--txt-2:#475569;--txt-3:#94a3b8;
  --accent:#2563eb;--accent-h:#1d4ed8;--accent-bg:#eff6ff;
  --red:#ef4444;--red-bg:#fef2f2;
  --sh-md:0 4px 20px rgba(15,23,42,.09),0 2px 6px rgba(15,23,42,.05);
  --r:16px;--r-sm:10px;--r-xs:7px;--font:'Poppins',sans-serif;--dur:.22s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--txt);font-size:13px;-webkit-font-smoothing:antialiased}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#f0f4fa 0%,#e8effc 100%)}

.login-wrap{width:100%;max-width:400px;padding:16px}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:32px}
.login-mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#2563eb 0%,#0ea5e9 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(37,99,235,.4)}
.login-mark svg{fill:#fff;width:28px;height:28px}
.login-title{font-size:22px;font-weight:800;letter-spacing:-.5px;text-align:center}
.login-title em{font-style:normal;color:var(--accent)}
.login-sub{font-size:12px;color:var(--txt-3);text-align:center}

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;box-shadow:var(--sh-md);display:flex;flex-direction:column;gap:18px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:12px;font-weight:600;color:var(--txt-2)}
.form-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:13.5px;color:var(--txt);background:var(--bg);outline:none;transition:border-color var(--dur),box-shadow var(--dur)}
.form-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.btn-login{width:100%;padding:11px;border:none;border-radius:var(--r-sm);background:var(--accent);color:#fff;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:all var(--dur);box-shadow:0 3px 12px rgba(37,99,235,.35)}
.btn-login:hover{background:var(--accent-h);box-shadow:0 5px 18px rgba(37,99,235,.45);transform:translateY(-1px)}
.btn-login:active{transform:translateY(0)}
#login-err{background:var(--red-bg);border:1px solid #fca5a5;border-radius:var(--r-xs);padding:10px 12px;color:#b91c1c;font-size:12.5px;display:none;align-items:center;gap:8px}
#login-err.show{display:flex}
#login-err svg{fill:var(--red);width:14px;height:14px;flex-shrink:0}
.login-hint{text-align:center;font-size:11.5px;color:var(--txt-3);background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xs);padding:10px;line-height:1.7}
.login-hint strong{color:var(--txt-2)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-mark">
      <svg viewBox="0 0 24 24"><path d="M20 8.94a1.07 1.07 0 0 0-.06-.27l-.09-.2-6-5.71a1 1 0 0 0-.09-.07 1 1 0 0 0-1.25 0l-.09.07-6 5.71a.68.68 0 0 0-.09.2 1.1 1.1 0 0 0-.06.27A1 1 0 0 0 6 9v10a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1V9a1 1 0 0 0 0-.06z"/></svg>
    </div>
    <div>
      <div class="login-title">Estoque<em>Flow</em></div>
      <div class="login-sub">Sistema de Controle de Estoque</div>
    </div>
  </div>

  <div class="login-card">
    <div id="login-err">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="login-err-msg">Erro.</span>
    </div>
    <div class="form-group">
      <label class="form-label" for="username">Usuário</label>
      <input class="form-input" type="text" id="username" placeholder="admin ou user" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Senha</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-hint">
      <strong>admin</strong> / 1234 &nbsp;·&nbsp; <strong>user</strong> / 1234
    </div>
  </div>
</div>
<script>
// Redirect se já logado
if (Auth.getSession()) window.location.href = 'dashboard.html';

function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('btn-login');
  err.classList.remove('show');
  btn.textContent = 'Entrando...';
  btn.disabled = true;
  setTimeout(() => {
    const res = Auth.login(u, p);
    if (res.ok) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('login-err-msg').textContent = res.error;
      err.classList.add('show');
      btn.textContent = 'Entrar';
      btn.disabled = false;
    }
  }, 300);
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
</script>
</body>
</html>
