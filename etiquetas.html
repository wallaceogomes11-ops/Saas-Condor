<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstoqSaaS — Etiquetas</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .two-panel {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media(max-width:900px){ .two-panel{grid-template-columns:1fr} }

    .item-check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 6px;
      cursor: pointer;
      transition: var(--transition);
    }

    .item-check-row:hover { border-color: var(--border2); background: var(--surface2); }
    .item-check-row.selected { border-color: var(--amber); background: var(--amber-glow); }

    .item-check-name { font-size: 13px; font-weight: 500; flex: 1; }
    .item-check-meta { font-size: 11px; color: var(--text3); font-family: var(--font-mono); }

    /* Label preview */
    .label-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }

    .label-card {
      background: white;
      color: #111;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      line-height: 1.5;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
    }

    .label-card .label-title {
      font-size: 13px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      margin-bottom: 8px;
      color: #111;
      border-bottom: 1.5px solid #222;
      padding-bottom: 6px;
    }

    .label-card .label-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .label-card .label-key { color: #666; font-size: 10px; text-transform: uppercase; }
    .label-card .label-val { font-weight: 600; color: #111; }

    .label-card .label-barcode {
      margin-top: 10px;
      text-align: center;
      letter-spacing: 4px;
      font-size: 18px;
      color: #111;
      font-family: monospace;
      border: 1px solid #e0e0e0;
      padding: 4px;
      border-radius: 4px;
    }

    .select-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .select-count {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--amber);
    }

    .config-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .config-row label {
      font-size: 12px;
      color: var(--text3);
      font-family: var(--font-mono);
    }

    #listItems { max-height: 520px; overflow-y: auto; }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="nav-placeholder"></div>

  <main class="main-content fade-in">
    <div class="page-header">
      <div>
        <h1 class="page-title">Gerador de Etiquetas</h1>
        <p class="page-subtitle">Selecione itens e gere etiquetas para impressão ou PDF</p>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-secondary" id="btnSelectAll">Selecionar tudo</button>
        <button class="btn btn-primary" id="btnGeneratePDF" disabled>↓ Gerar PDF</button>
      </div>
    </div>

    <div class="two-panel">
      <!-- Left: item selector -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📦 Itens da Planilha</span>
          <span class="select-count" id="selCount">0 selecionados</span>
        </div>
        <div class="select-bar">
          <input class="input" type="text" id="itemSearch" placeholder="Filtrar itens…" style="flex:1">
        </div>
        <div id="listItems">
          <div class="loading-state"><div class="spinner"></div><span>Carregando…</span></div>
        </div>
      </div>

      <!-- Right: preview -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">👁 Pré-visualização</span>
        </div>
        <div class="config-row">
          <label>Cópias:</label>
          <input class="input" type="number" id="cfgCopies" value="1" min="1" max="50" style="width:70px">
          <label>Mostrar barcode:</label>
          <input type="checkbox" id="cfgBarcode" checked>
        </div>
        <div id="previewArea">
          <div class="empty-state">
            <div class="empty-icon">◪</div>
            <p>Selecione itens para visualizar as etiquetas</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  AUTH.requireAuth();
  injectNav('etiquetas');

  let _data = [];
  let _selected = new Set();

  async function loadData() {
    try {
      _data = await API.fetchData();
      renderList(_data);
    } catch(e) {
      document.getElementById('listItems').innerHTML =
        `<div class="empty-state"><span style="color:var(--red)">Erro: ${e.message}</span></div>`;
    }
  }

  function renderList(items) {
    const el = document.getElementById('listItems');
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><p>Nenhum item encontrado</p></div>';
      return;
    }
    el.innerHTML = items.map((item, i) => {
      const id = item._rowIndex;
      const sel = _selected.has(id);
      return `
        <div class="item-check-row ${sel?'selected':''}" onclick="toggleSelect(${id})" data-id="${id}">
          <input type="checkbox" ${sel?'checked':''} onclick="event.stopPropagation();toggleSelect(${id})">
          <div class="item-check-name">${item.nome || 'Sem nome'}</div>
          <div class="item-check-meta">
            ${item.quantidade ? `Qtd: ${item.quantidade}` : ''}
            ${item.lote ? `• L: ${item.lote}` : ''}
            ${item.validade ? `• Val: ${item.validade}` : ''}
          </div>
        </div>`;
    }).join('');
  }

  function toggleSelect(id) {
    if (_selected.has(id)) _selected.delete(id);
    else _selected.add(id);
    updateSelectionUI();
    renderPreview();
  }

  function updateSelectionUI() {
    const count = _selected.size;
    document.getElementById('selCount').textContent = `${count} selecionado${count!==1?'s':''}`;
    document.getElementById('btnGeneratePDF').disabled = count === 0;

    // update checkboxes
    document.querySelectorAll('[data-id]').forEach(el => {
      const id = parseInt(el.dataset.id);
      const sel = _selected.has(id);
      el.classList.toggle('selected', sel);
      const cb = el.querySelector('input[type=checkbox]');
      if (cb) cb.checked = sel;
    });
  }

  function renderPreview() {
    const el = document.getElementById('previewArea');
    const copies = parseInt(document.getElementById('cfgCopies').value) || 1;
    const showBarcode = document.getElementById('cfgBarcode').checked;
    const selectedItems = _data.filter(d => _selected.has(d._rowIndex));

    if (!selectedItems.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">◪</div><p>Selecione itens para visualizar</p></div>';
      return;
    }

    const all = [];
    selectedItems.forEach(item => {
      for (let c = 0; c < Math.min(copies, 5); c++) all.push(item); // preview max 5 per item
    });

    el.innerHTML = `<div class="label-preview-grid">${all.slice(0,12).map(item => buildLabelHTML(item, showBarcode)).join('')}</div>
      ${all.length > 12 ? `<p style="text-align:center;color:var(--text3);font-size:12px;padding:12px">…e mais ${all.length-12} etiquetas (no PDF)</p>` : ''}`;
  }

  function buildLabelHTML(item, showBarcode) {
    const rows = [];
    if (item.quantidade) rows.push(['Quantidade', item.quantidade]);
    if (item.lote)       rows.push(['Lote', item.lote]);
    if (item.validade)   rows.push(['Validade', item.validade]);
    if (item.pedido)     rows.push(['Pedido', item.pedido]);
    if (item.status)     rows.push(['Status', item.status]);
    if (item.local)      rows.push(['Local', item.local]);
    if (item.fornecedor) rows.push(['Fornecedor', item.fornecedor]);

    return `
      <div class="label-card">
        <div class="label-title">${item.nome || 'Sem nome'}</div>
        ${rows.map(([k,v]) => `
          <div class="label-row">
            <span class="label-key">${k}</span>
            <span class="label-val">${v}</span>
          </div>`).join('')}
        ${showBarcode ? `<div class="label-barcode">||||| ${(item._rowIndex+'').padStart(6,'0')} |||||</div>` : ''}
      </div>`;
  }

  // PDF Generation
  document.getElementById('btnGeneratePDF').addEventListener('click', generatePDF);

  async function generatePDF() {
    const { jsPDF } = window.jspdf;
    if (!jsPDF) { toast('Biblioteca jsPDF não carregada', 'error'); return; }

    const copies    = parseInt(document.getElementById('cfgCopies').value) || 1;
    const showBarcode = document.getElementById('cfgBarcode').checked;
    const selectedItems = _data.filter(d => _selected.has(d._rowIndex));

    if (!selectedItems.length) return;

    toast('Gerando PDF…', 'info');

    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });

    const W = 210, H = 297;
    const cols = 3, rows = 4;
    const labelW = (W - 20) / cols;
    const labelH = (H - 20) / rows;
    const marginX = 10, marginY = 10;

    let idx = 0;
    const total = selectedItems.length * copies;

    selectedItems.forEach(item => {
      for (let c = 0; c < copies; c++) {
        const page = Math.floor(idx / (cols * rows));
        const posInPage = idx % (cols * rows);
        const col = posInPage % cols;
        const row = Math.floor(posInPage / cols);

        if (page > 0 && posInPage === 0) doc.addPage();

        const x = marginX + col * labelW;
        const y = marginY + row * labelH;

        // Border
        doc.setDrawColor(180, 180, 180);
        doc.setLineWidth(0.3);
        doc.rect(x, y, labelW - 2, labelH - 2);

        // Title
        doc.setFontSize(9);
        doc.setFont('helvetica', 'bold');
        doc.setTextColor(30, 30, 30);
        const name = (item.nome || 'Sem nome').substring(0, 30);
        doc.text(name, x + 3, y + 7);
        doc.setDrawColor(100, 100, 100);
        doc.line(x + 2, y + 9, x + labelW - 4, y + 9);

        // Fields
        doc.setFontSize(7);
        doc.setFont('helvetica', 'normal');
        let lineY = y + 13;

        const fields = [
          item.quantidade && ['Qtd:', item.quantidade],
          item.lote       && ['Lote:', item.lote],
          item.validade   && ['Val:', item.validade],
          item.pedido     && ['Pedido:', item.pedido],
          item.status     && ['Status:', item.status],
          item.local      && ['Local:', item.local],
        ].filter(Boolean);

        fields.slice(0, 6).forEach(([k, v]) => {
          doc.setTextColor(100, 100, 100);
          doc.text(k, x + 3, lineY);
          doc.setTextColor(30, 30, 30);
          doc.setFont('helvetica', 'bold');
          doc.text(String(v).substring(0, 22), x + 16, lineY);
          doc.setFont('helvetica', 'normal');
          lineY += 5;
        });

        // Barcode
        if (showBarcode) {
          doc.setFontSize(6);
          doc.setTextColor(60, 60, 60);
          doc.text(`[${(item._rowIndex+'').padStart(6,'0')}]`, x + labelW/2 - 8, y + labelH - 5);
        }

        idx++;
      }
    });

    doc.save(`etiquetas_${new Date().toISOString().slice(0,10)}.pdf`);
    toast(`PDF gerado: ${total} etiqueta${total!==1?'s':''}!`, 'success');
  }

  // Select all / deselect all
  document.getElementById('btnSelectAll').addEventListener('click', () => {
    if (_selected.size === _data.length) {
      _selected.clear();
      document.getElementById('btnSelectAll').textContent = 'Selecionar tudo';
    } else {
      _data.forEach(d => _selected.add(d._rowIndex));
      document.getElementById('btnSelectAll').textContent = 'Desmarcar tudo';
    }
    updateSelectionUI();
    renderPreview();
  });

  // Search filter
  document.getElementById('itemSearch').addEventListener('input', function() {
    const q = this.value.toLowerCase();
    const filtered = q ? _data.filter(d => (d.nome+d.lote+d.pedido).toLowerCase().includes(q)) : _data;
    renderList(filtered);
  });

  // Config changes → re-render preview
  document.getElementById('cfgCopies').addEventListener('input', renderPreview);
  document.getElementById('cfgBarcode').addEventListener('change', renderPreview);

  loadData();
</script>
</body>
</html>
