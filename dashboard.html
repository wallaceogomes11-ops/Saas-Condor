<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EstoqSaaS — Dashboard</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .alerts-panel { margin-bottom: 28px; }

    .ranking-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .ranking-item:last-child { border-bottom: none; }

    .rank-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
      width: 20px;
      flex-shrink: 0;
    }

    .rank-bar-wrap { flex: 1; }
    .rank-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .rank-bar-bg {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .rank-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--amber-dim));
      border-radius: 99px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }
    .rank-qty {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--amber);
      width: 50px;
      text-align: right;
      flex-shrink: 0;
    }

    .status-chart {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-label {
      font-size: 12px;
      color: var(--text2);
      width: 120px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .status-bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .8s cubic-bezier(.4,0,.2,1);
    }

    .status-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text3);
      width: 28px;
      text-align: right;
      flex-shrink: 0;
    }

    .urgency-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .urgency-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      padding: 4px;
      border-radius: var(--radius-sm);
      margin-bottom: 18px;
      width: fit-content;
    }

    .tab-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 13px;
      font-family: var(--font-body);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: var(--transition);
    }

    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
    }

    .blink { animation: blink 1.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.5} }
  </style>
</head>
<body>
<div class="app-layout">
  <div id="nav-placeholder"></div>

  <main class="main-content fade-in">
    <div class="page-header">
      <div>
        <h1 class="page-title">Dashboard Operacional</h1>
        <p class="page-subtitle" id="subtitleDate">Carregando dados…</p>
      </div>
      <button class="btn btn-secondary" onclick="loadAll(true)">↻ Atualizar</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid stagger" id="statsGrid">
      <div class="stat-card amber"><div class="stat-label">Total de Itens</div><div class="stat-value" id="statTotal">—</div><div class="stat-sub">registros na planilha</div></div>
      <div class="stat-card red"><div class="stat-label">Críticos</div><div class="stat-value" id="statCriticos">—</div><div class="stat-sub">vencidos ou próximos</div></div>
      <div class="stat-card green"><div class="stat-label">Quantidade Total</div><div class="stat-value" id="statQtd">—</div><div class="stat-sub">unidades em estoque</div></div>
      <div class="stat-card blue"><div class="stat-label">Sem Data</div><div class="stat-value" id="statSemData">—</div><div class="stat-sub">sem validade registrada</div></div>
    </div>

    <!-- Alerts -->
    <div class="alerts-panel">
      <div class="card">
        <div class="card-header">
          <span class="card-title">⚠ Alertas Inteligentes</span>
          <div class="tabs" id="alertTabs">
            <button class="tab-btn active" onclick="filterAlerts('all', this)">Todos</button>
            <button class="tab-btn" onclick="filterAlerts(3, this)">Vencidos</button>
            <button class="tab-btn" onclick="filterAlerts(2, this)">Em breve</button>
            <button class="tab-btn" onclick="filterAlerts(1, this)">30 dias</button>
          </div>
        </div>
        <div id="alertsList">
          <div class="loading-state"><div class="spinner"></div><span>Analisando estoque…</span></div>
        </div>
      </div>
    </div>

    <!-- Bottom row -->
    <div class="grid-2">
      <!-- Ranking -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">🏆 Ranking por Quantidade</span>
        </div>
        <div id="rankingList">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Status distribution -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">◫ Distribuição por Status</span>
        </div>
        <div id="statusChart">
          <div class="loading-state"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  const session = AUTH.requireAuth();
  if (session) injectNav('dashboard');

  let _allCriticos = [];
  let _currentFilter = 'all';

  const PALETTE = ['#f5a623','#4f9cf9','#34c77b','#f05252','#a78bfa','#f472b6','#22d3ee'];

  async function loadAll(force = false) {
    try {
      const data = await API.fetchData(force);
      const stats = API.computeStats(data);

      // Update stats
      animateNumber('statTotal', stats.total);
      animateNumber('statCriticos', stats.criticos.filter(c=>c.urgencia>=2).length);
      animateNumber('statQtd', stats.totalQtd);
      animateNumber('statSemData', stats.semValidade);

      // Update subtitle
      document.getElementById('subtitleDate').textContent =
        `${data.length} registros • Atualizado às ${new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}`;

      // Alerts
      _allCriticos = stats.criticos;
      renderAlerts(_allCriticos, _currentFilter);

      // Ranking — sort by qty
      renderRanking(data);

      // Status chart
      renderStatusChart(stats.porStatus);

      if (force) toast('Dados atualizados!', 'success');
    } catch (e) {
      console.error(e);
      toast('Erro ao carregar dados: ' + e.message, 'error');
    }
  }

  function animateNumber(id, target) {
    const el = document.getElementById(id);
    if (!el) return;
    let start = 0;
    const step = Math.max(1, Math.round(target / 20));
    const timer = setInterval(() => {
      start = Math.min(start + step, target);
      el.textContent = start.toLocaleString('pt-BR');
      if (start >= target) clearInterval(timer);
    }, 30);
  }

  function filterAlerts(urgencia, btn) {
    _currentFilter = urgencia;
    document.querySelectorAll('#alertTabs .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderAlerts(_allCriticos, urgencia);
  }

  function renderAlerts(criticos, filter) {
    const el = document.getElementById('alertsList');
    const filtered = filter === 'all' ? criticos : criticos.filter(c => c.urgencia === filter);

    if (!filtered.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><p>${filter==='all'?'Nenhum alerta encontrado.':'Nenhum item nessa categoria.'}</p></div>`;
      return;
    }

    const icons = { 3: '🔴', 2: '🟡', 1: '🔵' };
    el.innerHTML = filtered.slice(0, 20).map(c => `
      <div class="alert-item urgencia-${c.urgencia}">
        <span class="alert-icon">${icons[c.urgencia] || '⚪'}</span>
        <div>
          <div class="alert-name">${c.item.nome || 'Item sem nome'}</div>
          <div class="alert-meta">
            ${c.motivo} 
            ${c.item.validade ? `• Validade: ${c.item.validade}` : ''}
            ${c.item.quantidade ? `• Qtd: ${c.item.quantidade}` : ''}
            ${c.item.lote ? `• Lote: ${c.item.lote}` : ''}
          </div>
        </div>
      </div>
    `).join('');

    if (filtered.length > 20)
      el.innerHTML += `<p style="text-align:center;color:var(--text3);font-size:12px;padding:12px">…e mais ${filtered.length-20} itens</p>`;
  }

  function renderRanking(data) {
    const el = document.getElementById('rankingList');
    const sorted = [...data]
      .map(d => ({ nome: d.nome || 'Sem nome', qty: parseInt(d.quantidade) || 0 }))
      .sort((a, b) => b.qty - a.qty)
      .slice(0, 10);

    if (!sorted.length) { el.innerHTML = '<div class="empty-state"><p>Sem dados</p></div>'; return; }

    const max = sorted[0].qty || 1;
    el.innerHTML = sorted.map((item, i) => `
      <div class="ranking-item">
        <span class="rank-num">${i+1}</span>
        <div class="rank-bar-wrap">
          <div class="rank-name">${item.nome}</div>
          <div class="rank-bar-bg">
            <div class="rank-bar-fill" style="width:${(item.qty/max*100).toFixed(1)}%"></div>
          </div>
        </div>
        <span class="rank-qty">${item.qty.toLocaleString('pt-BR')}</span>
      </div>
    `).join('');
  }

  function renderStatusChart(porStatus) {
    const el = document.getElementById('statusChart');
    const entries = Object.entries(porStatus).sort((a,b)=>b[1]-a[1]);
    if (!entries.length) { el.innerHTML = '<div class="empty-state"><p>Sem dados</p></div>'; return; }

    const total = entries.reduce((s,[,v])=>s+v,0);
    el.innerHTML = `<div class="status-chart">${entries.map(([st, cnt], i) => `
      <div class="status-row">
        <span class="status-label" title="${st}">${st}</span>
        <div class="status-bar-bg">
          <div class="status-bar-fill" style="width:${(cnt/total*100).toFixed(1)}%;background:${PALETTE[i%PALETTE.length]}"></div>
        </div>
        <span class="status-count">${cnt}</span>
      </div>
    `).join('')}</div>`;
  }

  // Auto refresh every 2 minutes
  loadAll();
  setInterval(() => loadAll(), 120_000);
</script>
</body>
</html>
